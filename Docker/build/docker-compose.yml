services:
  build:
    build:
      context: ../..
      dockerfile: Docker/build/Dockerfile
    working_dir: /src
    volumes:
      - ../..:/src
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    stdin_open: true
    tty: true

volumes:
  go-mod-cache:
  go-build-cache:
